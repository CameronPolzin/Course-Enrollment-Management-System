{% extends "base.html" %}

{% block title %}
    Special Enrollment Request
{% endblock %}

{% block content %}

<h1>
    Special Enrollment Request
</h1>

<div
    class="auth-container"
    style="
        text-align: center;
        max-width: 500px;
        margin: 30px auto;
    "
>

    <p>
        <strong>
            {{ course.course_code }}
        </strong>
        -
        {{ course.name }}
    </p>

    <form
        method="post"
        style="
            display: flex;
            flex-direction: column;
            align-items: center;
        "
    >

        {% csrf_token %}

        <div
            class="form-group"
            style="
                width: 100%;
                text-align: center;
            "
        >

            <label>
                Reason for Request
            </label>

            <div
                style="
                    display: flex;
                    justify-content: center;
                    margin-top: 10px;
                "
            >
                {{ form.reason }}
            </div>

        </div>

        <button
            type="submit"
            style="margin-top: 15px;"
        >
            Submit Request
        </button>

    </form>

    <p style="margin-top: 20px;">
        <a href="{% url 'course_list' %}">
            Cancel
        </a>
    </p>

</div>

{% endblock %}
